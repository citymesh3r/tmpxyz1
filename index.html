<!DOCTYPE html>

  <title>City-Mesh3R</title>
<link rel="stylesheet" href="static/vendor/google-fonts/fonts.css">

<body>
  <nav class="navbar is-fixed-top site-nav" aria-label="main navigation">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item brand-mark" href="#hero" data-text="nav.brand">City-Mesh3R</a>
        <button class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="site-navbar-menu">
          <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
        </button>
      </div>
      <div id="site-navbar-menu" class="navbar-menu">
        <div class="navbar-end">
          <a class="navbar-item" href="#abstract" data-text="nav.abstract">Abstract</a>
          <a class="navbar-item" href="#method" data-text="nav.method">Method</a>
          <a class="navbar-item" href="#videos" data-text="nav.videos">Videos</a>
          <a class="navbar-item" href="#image-comparisons" data-text="nav.images">Images</a>
          <a class="navbar-item" href="#results" data-text="nav.results">Results</a>
          <a class="navbar-item" href="#bibtex" data-text="nav.bibtex">BibTeX</a>
          <button id="theme-toggle" class="navbar-item theme-toggle" type="button" aria-label="Toggle light/dark theme">
            <span class="icon"><i class="fa-solid fa-moon"></i></span>
            <span class="theme-toggle-label">Dark</span>
          </button>
        </div>
      </div>
    </div>

  <!-- Section order is intentionally controlled here. Move whole <section> blocks to reorder the page. -->

  <section id="hero" class="hero section-pad hero-gradient">
    <div class="container is-max-widescreen has-text-centered">
      <p id="hero-eyebrow" class="eyebrow"></p>
      <h1 id="hero-title" class="main-title"></h1>
      <div id="authors" class="authors"></div>
      <div id="affiliations" class="affiliations"></div>
      <div id="venue-line" class="venue-line"></div>
      <div id="paper-links" class="button-row"></div>
      <p id="tagline" class="tagline"></p>
    </div>
  </section>

  <section id="teaser" class="section section-pad compact-top">
    <div class="container is-max-widescreen">
      <div id="teaser-media" class="media-frame hero-media natural-media"></div>
      <p id="teaser-caption" class="caption centered-caption"></p>
    </div>
  </section>

  <section id="abstract" class="section section-pad alt-bg">
    <div class="container is-max-desktop">
      <div class="section-heading centered" data-heading="abstract"></div>
      <div id="abstract-text" class="paper-text"></div>

      <div id="contribution-grid" class="card-grid four"></div>
    </div>

      <div class="section-heading centered" data-heading="method"></div>
      <div id="pipeline-media" class="media-frame natural-media"></div>

      <div class="subsection-block">
        <div class="section-heading compact" data-heading="areaVisualizer"></div>
        <div id="area-visualizer" data-video-card="areaPartitioning"></div>
      </div>
     
    </div>
  </section>

    <div class="container is-max-widescreen">
      <div class="section-heading centered" data-heading="largeScaleVideos"></div>

      <div class="subsection-block">
        <div class="section-heading compact" data-heading="cameraWalkthrough"></div>

      <div class="section-heading centered" data-heading="applications"></div>

      <div class="section-heading centered" data-heading="bibtex"></div>

  <footer class="footer site-footer">
    <div class="container is-max-desktop has-text-centered">

    </div>
